<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elementos de un Formulario</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f0f2f5;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #444;
    }

    form {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .campo {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    input[type="date"],
    input[type="color"],
    input[type="range"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .grupo-radio,
    .grupo-checkbox {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .grupo-radio label,
    .grupo-checkbox label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 24px 0;
    }

    .tipo {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      font-style: italic;
    }

    .botones {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button, input[type="submit"], input[type="reset"] {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    input[type="submit"] {
      background: #4a90e2;
      color: white;
    }

    input[type="reset"] {
      background: #e0e0e0;
      color: #333;
    }

    button[type="button"] {
      background: #6c757d;
      color: white;
    }

    output {
      font-size: 14px;
      font-weight: bold;
      color: #4a90e2;
    }
  </style>
</head>
<body>

  <h1>📋 Elementos de un Formulario</h1>
  <form>

      <!-- TEXT -->
      <div class="campo">
        <p class="tipo">input type="text"</p>
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej. Ana García">
      </div>

      <!-- EMAIL -->
      <div class="campo">
        <p class="tipo">input type="email"</p>
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">
      </div>

      <!-- PASSWORD -->
      <div class="campo">
        <p class="tipo">input type="password"</p>
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="putoelivan">
      </div>

      <hr>

      <!-- NUMBER -->
      <div class="campo">
        <p class="tipo">input type="number"</p>
        <label for="edad">Edad</label>
        <input type="number" id="edad" name="edad" min="1" max="120" placeholder="25">
      </div>

      <!-- DATE -->
      <div class="campo">
        <p class="tipo">input type="date"</p>
        <label for="fecha">Fecha de nacimiento</label>
        <input type="date" id="fecha" name="fecha">
      </div>

      <hr>

      <!-- SELECT -->
      <div class="campo">
        <p class="tipo">&lt;select&gt; con &lt;option&gt;</p>
        <label for="pais">País</label>
        <select id="pais" name="pais">
          <option value="">-- Selecciona un país --</option>
          <option value="mx">México</option>
          <option value="es">España</option>
          <option value="ar">Argentina</option>
          <option value="co">Colombia</option>
        </select>
      </div>

      <hr>

      <!-- RADIO -->
      <div class="campo">
        <p class="tipo">input type="radio"</p>
        <label>Género</label>
        <div class="grupo-radio">
          <label><input type="radio" name="genero" value="m"> Masculino</label>
          <label><input type="radio" name="genero" value="f"> Femenino</label>
          <label><input type="radio" name="genero" value="o"> Prefiero no decir</label>
        </div>
      </div>

      <hr>

      <!-- CHECKBOX -->
      <div class="campo">
        <p class="tipo">input type="checkbox"</p>
        <label>Intereses</label>
        <div class="grupo-checkbox">
          <label><input type="checkbox" name="interes" value="tech"> Tecnología</label>
          <label><input type="checkbox" name="interes" value="arte"> Arte</label>
          <label><input type="checkbox" name="interes" value="deporte"> Deporte</label>
        </div>
      </div>

      <hr>

      <!-- RANGE -->
      <div class="campo">
        <p class="tipo">input type="range"</p>
        <label for="nivel">Nivel de experiencia: <output id="valorNivel">5</output></label>
        <input type="range" id="nivel" name="nivel" min="1" max="10" value="5"
              oninput="document.getElementById('valorNivel').value = this.value">
      </div>

      <!-- COLOR -->
      <div class="campo">
        <p class="tipo">input type="color"</p>
        <label for="color">Color favorito</label>
        <input type="color" id="color" name="color" value="#4a90e2">
      </div>

      <hr>

      <!-- TEXTAREA -->
      <div class="campo">
        <p class="tipo">&lt;textarea&gt;</p>
        <label for="bio">Biografía</label>
        <textarea id="bio" name="bio" rows="4" placeholder="Cuéntanos algo sobre ti..."></textarea>
      </div>

      <hr>

      <!-- BOTONES -->
      <div class="campo">
        <p class="tipo">input type="submit" / "reset" y &lt;button&gt;</p>
        <div class="botones">
          <input type="submit" value="Enviar">
          <input type="reset" value="Limpiar">
          <button type="button">Botón genérico</button>
        </div>
      </div>

  </form>

</body>
</html>

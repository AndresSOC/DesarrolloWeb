<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Primera Página con CSS</title>
    <style>
        /* Estilo para el fondo de la página: body */
        body {
            background-color: black;
        }
        /* Estilo para el título principal: h1 */
        h1 {
            color: white;
            background-color: brown;
        }
        /* Estilo para los párrafos: p */
        p {
            font-size: 25px;
            color:white;
        }
        
    </style>
</head>
<body>

    <!-- Escribe tu título principal aquí -->
     <h1>Este es el titulo principal</h1>

    <!-- Escribe tu primer párrafo aquí -->
     <p>aqui va el primer parrafo</p>

    <!-- Escribe tu segundo párrafo aquí -->
     <p>aqui va el segundo parrafo</p>

</body>
</html>

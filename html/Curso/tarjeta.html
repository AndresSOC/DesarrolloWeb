<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Tarjeta</title>
    <style>
    
        /* Estilos para el body */
        body{
            background-color: #f0f0f0;
            display:flex;
            justify-content:center;
            padding:40px;
            
        }
       /* Estilos para .card */
       .card{
           background-color:white;
           width:300px;
           border-radius:8px;
           box-shadow:0 4px 8px rgba(0,0,0,0.2);
           overflow:hidden;
       }
       
       /* Estilos para .card img */
       .card img{
           width:100%;
       }
       
       /* Estilos para el .card-content */
       .card-content{
           padding:15px;
       }
       
       /* Estilos para el .card-content h3 */
       .card-content h3 {
           color:#2e7d32;
       }
       
       
       /* Estilos para el .card-content p */
       .card-content p {
           color:#555555;
           font-size:14px;
       }
       
    </style>
</head>
<body >
    <!-- Escriba aquí el contenedor con id card -->
    <div class="card">
        <!-- Inserta aquí la imagen montana.jpeg con alt, width='300' y height='200' -->
            <img src="images/gato.png" alt="Foto de una montaña">
        <!-- Escriba aquí el contenedor con id card-content -->
        <div class="card-content">
            <!-- Escribe aquí el título de la tarjeta -->
            <h3>Montaña sinaloense</h3>
            <!-- Escribe aquí la descripción de la tarjeta -->
            <p>esta imagen describe una montaña en sinaloa</p>
        </div>
    </div>
        
        

</body>
</html>

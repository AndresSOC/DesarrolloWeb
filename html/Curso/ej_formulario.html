<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Formulario de Registro</title>
    <style>
      /* Estilos body */
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f4f8;
        display: flex;
        justify-content: center;
        padding: 40px;
      }

      /* Estilos .registro */
      .registro {
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        width: 450px;
      }

      /* Estilos .registro h2 */
      .registro h2 {
        color: #1565c0;
        text-align: center;
      }

      /* Estilos fieldset */
      fieldset {
        border: white;
        border-radius: 4px;
        padding: 10px;
      }

      /* Estilos legend */
      legend {
        color: #1565c0;
        font-weight: bold;
      }

      /* Estilos label */
      label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
      }

      /* Estilos:
            input[type="text"],
            input[type="password"],
            input[type="date"],
            input[type="number"],
            input[type="tel"]
        */
      input[type="text"],
      input[type="password"],
      input[type="date"],
      input[type="number"],
      input[type="tel"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      /* Pseudoelemento input:focus */
      input:focus {
        border-color: #1565c0;
        outline: none;
      }

      /* Pseudoelemento input:invalid */
      input:invalid {
        border-color: #c62828;
      }

      /* Estilos button */
      button {
        background-color: #1565c0;
        color: white;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 4px;
        margin-top: 20px;
      }

      /* Pseudoelemento button:hover */
      button:hover {
        background-color: #0d47a1;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <form class="registro">
      <!-- Título del formulario: h2 -->
      <h2>Formulario de resgistro</h2>

      <!-- Nombre: solo letras y espacios, 3-50 caracteres: label + input[type="text"][pattern][required] -->
      <label for="nombre">Nombre:</label>
      <input
        id="nombre"
        type="text"
        pattern="[A-Za-zÑñáéíóú ]{3,30}"
        required
      />

      <!-- Fecha de nacimiento: label + input[type="date"][required] -->
      <label for="fecha_nacimiento">Fecha de Nacimiento</label>
      <input id="fecha_nacimiento" type="date" required />
      <!-- Edad: label + input[type="text"][min="1"][max="120"][required] -->
      <label for="edad">Edad:</label>
      <input id="edad" type="number" min="1" max="120" required />

      <!-- Teléfono: exactamente 10 dígitos: label + input[type="tel"][pattern][required] -->
      <label for="telefono">Télefono:</label>
      <input id="telefono" type="tel" pattern="[0-9]{10}" required />

      <!-- Contraseña: mínimo 8 caracteres, 1 mayúscula, 1 número: label + input[type="password"][pattern][required]  -->
      <label for="contraseña">Contraseña:</label>
      <input
        id="contraseña"
        type="password"
        pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
        required
      />

      <!-- Género con fieldset y radio buttons  -->
      <fieldset>
        <legend>Género:</legend>
        <!-- legend:Género -->
        <!-- input[type="radio"][name="genero"][value="masculino"][required] + label{Masculino} -->
        <input
          id="masculino"
          type="radio"
          name="genero"
          value="masculino"
          required
        />
        <label for="masculino">Masculino</label>
        <!-- input[type="radio"][name="genero"][value="femenino"] + label{Femenino} -->
        <input
          id="femenino"
          type="radio"
          name="genero"
          value="femenino"
          required
        />
        <label for="femenino">Femenino</label>
        <!-- input[type="radio"][name="genero"][value="otro"] + label{Prefiero no decir} -->
        <input id="otro" type="radio" name="genero" value="otro" required />
        <label for="otro">Prefiero no decir</label>
      </fieldset>

      <!-- Términos y condiciones -->
      <label>
        <!-- input[type="checkbox"][required] -->
        Acepto los términos y condiciones
        <input type="checkbox" required />
      </label>

      <!-- Botón enviar: button[type="submit"]{Registrarse} -->
      <button type="submit">Registrarse</button>
    </form>
  </body>
</html>
